<!DOCTYPE html>
<html>
<head>
    <title>Campus Navigator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Campus Navigator</h1>
    <form method="post">
        <label for="course_code">Course Code:</label>
        <input type="text" id="course_code" name="course_code"><br><br>
        <label for="start_location">Start Location:</label>
        <input type="text" id="start_location" name="start_location"><br><br>
        <label for="end_location">End Location:</label>
        <input type="text" id="end_location" name="end_location"><br><br>
        <input type="submit" value="Get Directions">
    </form>
    {% if class_location %}
        <p>Class Location: {{ class_location.building }} {{ class_location.room }}</p>
    {% endif %}
    {% if transit_info %}
        <p>Transit Info: {{ transit_info.bus_number }} {{ transit_info.arrival_time }}</p>
    {% endif %}
</body>
</html>
